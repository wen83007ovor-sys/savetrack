<!DOCTYPE html>

<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>省錢計劃 · 記帳本</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');

:root {
–bg:      #0f1117;
–surface: #1a1d27;
–card:    #22263a;
–border:  #2e3350;
–accent:  #6c8eff;
–accent2: #a78bfa;
–green:   #34d399;
–red:     #f87171;
–yellow:  #fbbf24;
–text:    #e8eaf6;
–muted:   #7b82a8;
–font:    ‘Noto Sans TC’, sans-serif;
}

- { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(–bg); color: var(–text); font-family: var(–font); font-size: 15px; min-height: 100vh; }

/* Header */
header {
background: linear-gradient(135deg,#1a1d27 0%,#12152a 100%);
border-bottom: 1px solid var(–border);
padding: 18px 20px 14px;
position: sticky; top: 0; z-index: 100;
}
.header-row { display: flex; align-items: center; justify-content: space-between; max-width: 720px; margin: 0 auto; }
.logo { font-size: 20px; font-weight: 700; }
.logo span { color: var(–accent); }
.week-nav { display: flex; align-items: center; gap: 10px; font-size: 13px; }
.week-nav button {
background: var(–card); border: 1px solid var(–border);
color: var(–text); border-radius: 6px; padding: 4px 10px; cursor: pointer; font-size: 13px;
}
.week-nav button:hover { border-color: var(–accent); color: var(–accent); }
#week-label { min-width: 160px; text-align: center; font-weight: 500; }

main { max-width: 720px; margin: 0 auto; padding: 20px 16px 80px; }

/* Summary Cards */
.summary-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 20px; }
.s-card { background: var(–card); border: 1px solid var(–border); border-radius: 12px; padding: 14px 12px; display: flex; flex-direction: column; gap: 4px; }
.s-label { font-size: 11px; color: var(–muted); text-transform: uppercase; letter-spacing: .6px; }
.s-value { font-size: 22px; font-weight: 700; }
.s-sub   { font-size: 11px; color: var(–muted); }
.c-green  { color: var(–green); }
.c-red    { color: var(–red); }
.c-accent { color: var(–accent); }
.c-yellow { color: var(–yellow); }

/* Progress */
.budget-bar-wrap { background: var(–card); border: 1px solid var(–border); border-radius: 12px; padding: 14px 16px; margin-bottom: 20px; }
.bar-label { display: flex; justify-content: space-between; font-size: 12px; color: var(–muted); margin-bottom: 8px; }
.bar-track { height: 10px; background: var(–border); border-radius: 99px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg,var(–accent),var(–accent2)); transition: width .4s ease, background .3s; }
.bar-fill.over { background: linear-gradient(90deg,var(–red),#ff6b6b); }

/* Alert */
.alert-bar { display: none; background: rgba(248,113,113,.12); border: 1px solid rgba(248,113,113,.4); border-radius: 10px; padding: 10px 14px; margin-bottom: 16px; font-size: 14px; color: var(–red); font-weight: 500; }
.alert-bar.show { display: block; }

/* Tabs */
.tabs { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.tab { background: var(–card); border: 1px solid var(–border); color: var(–muted); border-radius: 8px; padding: 7px 16px; cursor: pointer; font-family: var(–font); font-size: 13px; font-weight: 500; }
.tab.active { background: var(–accent); border-color: var(–accent); color: #fff; }

/* Add entry */
.add-box { background: var(–card); border: 1px solid var(–border); border-radius: 12px; padding: 16px; margin-bottom: 20px; }
.add-title { font-size: 13px; font-weight: 600; color: var(–muted); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 12px; }
.add-row { display: flex; gap: 8px; flex-wrap: wrap; }
.add-row input, .add-row select {
background: var(–surface); border: 1px solid var(–border);
color: var(–text); border-radius: 8px; padding: 9px 12px;
font-family: var(–font); font-size: 14px; outline: none;
}
.add-row input:focus, .add-row select:focus { border-color: var(–accent); }
#inp-desc { flex: 1; min-width: 120px; }
#inp-amt  { flex: 0 0 auto; width: 100px; min-width: 80px; }
#inp-date { flex: 0 0 auto; min-width: 130px; max-width: 160px; width: auto; }
#inp-cat  { flex: 1; min-width: 100px; }
.btn-add { background: var(–accent); color: #fff; border: none; border-radius: 8px; padding: 9px 18px; cursor: pointer; font-family: var(–font); font-size: 14px; font-weight: 600; white-space: nowrap; }
.btn-add:hover { opacity: .88; }

/* Entry list */
.section-title { font-size: 13px; font-weight: 600; color: var(–muted); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 10px; }
.entry-list { display: flex; flex-direction: column; gap: 6px; }
.entry-item { background: var(–card); border: 1px solid var(–border); border-radius: 10px; padding: 11px 14px; display: flex; align-items: center; gap: 10px; }
.e-date { font-size: 11px; color: var(–muted); width: 48px; flex-shrink: 0; }
.e-cat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.e-desc { flex: 1; font-size: 14px; }
.e-cat-badge { font-size: 10px; background: var(–surface); border-radius: 4px; padding: 2px 6px; color: var(–muted); white-space: nowrap; }
.e-amt { font-size: 15px; font-weight: 600; color: var(–red); width: 70px; text-align: right; }
.e-del { background: none; border: none; color: var(–muted); cursor: pointer; font-size: 16px; padding: 0 2px; flex-shrink: 0; }
.e-del:hover { color: var(–red); }
.empty-state { text-align: center; color: var(–muted); padding: 30px 0; font-size: 14px; }

/* Monthly */
.month-week { background: var(–card); border: 1px solid var(–border); border-radius: 10px; padding: 14px; margin-bottom: 10px; }
.mw-header { display: flex; justify-content: space-between; font-size: 14px; font-weight: 600; margin-bottom: 6px; }
.mw-sub { font-size: 12px; color: var(–muted); }

/* ── Fixed Bills (editable) ── */
.bills-section { background: var(–surface); border: 1px solid var(–border); border-radius: 12px; padding: 16px; margin-bottom: 16px; }
.bills-section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.bills-section-title { font-size: 13px; font-weight: 700; color: var(–accent); text-transform: uppercase; letter-spacing: .6px; }

.bill-edit-row {
display: grid;
grid-template-columns: 28px 1fr 90px 110px 80px 36px;
gap: 6px; align-items: center;
padding: 6px 0;
border-bottom: 1px solid var(–border);
}
.bill-edit-row:last-of-type { border-bottom: none; }
.bill-edit-row .emoji-cell { font-size: 18px; text-align: center; cursor: pointer; user-select: none; }
.bill-edit-row input[type=text], .bill-edit-row input[type=number], .bill-edit-row select {
background: var(–card); border: 1px solid var(–border);
color: var(–text); border-radius: 6px; padding: 6px 8px;
font-family: var(–font); font-size: 13px; outline: none; width: 100%;
}
.bill-edit-row input:focus, .bill-edit-row select:focus { border-color: var(–accent); }
.bill-edit-row .weekly-cell { font-size: 13px; font-weight: 600; color: var(–yellow); text-align: right; padding-right: 4px; }
.bill-del-btn { background: none; border: none; color: var(–muted); cursor: pointer; font-size: 18px; padding: 0; line-height: 1; }
.bill-del-btn:hover { color: var(–red); }

/* Column header */
.bill-col-header {
display: grid;
grid-template-columns: 28px 1fr 90px 110px 80px 36px;
gap: 6px; padding: 0 0 6px 0;
border-bottom: 1px solid var(–border);
margin-bottom: 4px;
}
.bill-col-header span { font-size: 10px; color: var(–muted); text-transform: uppercase; letter-spacing: .5px; }
.bill-col-header span:nth-child(n+3) { text-align: center; }

.btn-add-bill {
background: var(–surface); border: 1px dashed var(–border);
color: var(–muted); border-radius: 8px; padding: 8px 14px;
cursor: pointer; font-family: var(–font); font-size: 13px;
width: 100%; margin-top: 10px; transition: border-color .2s, color .2s;
}
.btn-add-bill:hover { border-color: var(–accent); color: var(–accent); }

/* Income summary */
.income-summary { background: var(–card); border: 1px solid var(–border); border-radius: 12px; padding: 16px; margin-bottom: 16px; }
.income-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; font-size: 14px; }
.income-row.total { border-top: 1px solid var(–border); margin-top: 6px; padding-top: 10px; font-weight: 700; font-size: 15px; }
.income-edit-row { display: flex; align-items: center; gap: 8px; padding: 5px 0; font-size: 14px; }
.income-edit-row label { flex: 1; color: var(–muted); }
.income-edit-row input {
background: var(–surface); border: 1px solid var(–border); color: var(–text);
border-radius: 6px; padding: 6px 10px; font-family: var(–font); font-size: 14px;
outline: none; width: 120px; text-align: right;
}
.income-edit-row input:focus { border-color: var(–accent); }

/* Budget breakdown */
.budget-breakdown { background: var(–card); border: 1px solid var(–border); border-radius: 12px; padding: 16px; }
.bd-row { display: flex; justify-content: space-between; font-size: 14px; padding: 5px 0; }
.bd-row.editable { align-items: center; gap: 8px; }
.bd-row input {
background: var(–surface); border: 1px solid var(–border); color: var(–text);
border-radius: 6px; padding: 6px 10px; font-family: var(–font); font-size: 14px;
outline: none; width: 110px; text-align: right;
}
.bd-row input:focus { border-color: var(–accent); }
.bd-divider { border: none; border-top: 1px solid var(–border); margin: 8px 0; }
.bd-row.highlight { font-weight: 700; font-size: 15px; }

/* Emoji picker mini */
.emoji-options { display: flex; flex-wrap: wrap; gap: 6px; padding: 8px; background: var(–card); border: 1px solid var(–border); border-radius: 8px; position: absolute; z-index: 200; }
.emoji-options span { font-size: 20px; cursor: pointer; padding: 2px 4px; border-radius: 4px; }
.emoji-options span:hover { background: var(–border); }

/* Responsive */
@media (max-width: 540px) {
.summary-grid { grid-template-columns: repeat(2,1fr); }
.s-value { font-size: 18px; }
.add-row { flex-direction: column; }
#inp-amt, #inp-date, #inp-cat, #inp-desc { width: 100%; max-width: 100%; flex: 1 1 100%; }
.bill-edit-row { grid-template-columns: 28px 1fr 80px 90px 70px 30px; gap: 4px; }
.bill-col-header { grid-template-columns: 28px 1fr 80px 90px 70px 30px; gap: 4px; }
}
@media (max-width: 420px) {
.bill-edit-row { grid-template-columns: 28px 1fr 70px 80px 60px 28px; }
.bill-col-header { grid-template-columns: 28px 1fr 70px 80px 60px 28px; }
}
</style>

</head>

<script>
// ═══════════════════════════════════════
//  CONSTANTS & EMOJIS
// ═══════════════════════════════════════
const CAT_COLORS = { food:'#6c8eff', transport:'#34d399', kids:'#a78bfa', health:'#fbbf24', misc:'#7b82a8' };
const CAT_NAMES  = { food:'伙食', transport:'交通', kids:'小孩', health:'醫療', misc:'其他' };

const FREQ_OPTIONS = [
  { value:'weekly',       label:'每週',     divisor: 1 },
  { value:'fortnightly',  label:'每兩週',   divisor: 2 },
  { value:'monthly',      label:'每月',     divisor: 4.33 },
  { value:'bimonthly',    label:'每兩個月', divisor: 8.67 },
  { value:'quarterly',    label:'每季',     divisor: 13 },
  { value:'yearly',       label:'每年',     divisor: 52 },
];

const EMOJI_LIST = ['🏠','💡','🌐','📱','🛡️','🧒','🍼','🚗','💊','🐾','📦','🎓','🏋️','☕','🎵','📺','🔧','✂️','🧹','💈'];

const DEFAULT_BILLS = [
  { id:'b1', emoji:'🏠', name:'房租',            amt:1200,  freq:'fortnightly' },
  { id:'b2', emoji:'🛡️', name:'保險',            amt:204.14,freq:'monthly'     },
  { id:'b3', emoji:'💡', name:'Synergy 電費',    amt:257.48,freq:'bimonthly'   },
  { id:'b4', emoji:'🌐', name:'網路',            amt:70,    freq:'monthly'     },
  { id:'b5', emoji:'📱', name:'手機費 Cora',     amt:55,    freq:'monthly'     },
  { id:'b6', emoji:'📱', name:'手機費 Ryan',     amt:35,    freq:'monthly'     },
  { id:'b7', emoji:'🧒', name:'幼兒園',          amt:101,   freq:'monthly'     },
  { id:'b8', emoji:'🍼', name:'尿布',            amt:30,    freq:'monthly'     },
];

const DEFAULT_SETTINGS = {
  salary: 1000,
  subsidy: 500,
  foodBudget: 350,
  bills: DEFAULT_BILLS
};

// ═══════════════════════════════════════
//  STATE
// ═══════════════════════════════════════
let currentWeekOffset = 0;
let entries  = JSON.parse(localStorage.getItem('budget_entries')  || '[]');
let settings = JSON.parse(localStorage.getItem('budget_settings') || 'null') || JSON.parse(JSON.stringify(DEFAULT_SETTINGS));

// Ensure bills have IDs
settings.bills.forEach((b,i) => { if (!b.id) b.id = 'b_'+Date.now()+i; });

// ═══════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════
function weeklyIncome() {
  return settings.salary + settings.subsidy / 2;
}

function weeklyBills() {
  return settings.bills.reduce((s,b) => {
    const f = FREQ_OPTIONS.find(o => o.value === b.freq) || FREQ_OPTIONS[2];
    return s + b.amt / f.divisor;
  }, 0);
}

function weeklyFoodBudget() { return settings.foodBudget; }

function getWeekDates(offset = 0) {
  const now = new Date();
  const monday = new Date(now);
  monday.setDate(now.getDate() - ((now.getDay() + 6) % 7) + offset * 7);
  monday.setHours(0,0,0,0);
  const sunday = new Date(monday);
  sunday.setDate(monday.getDate() + 6);
  sunday.setHours(23,59,59,999);
  return { monday, sunday };
}

function fmtDate(d)      { return d.toLocaleDateString('zh-TW', { month:'short', day:'numeric' }); }
function fmtDateInp(d)   { return d.toISOString().slice(0,10); }
function isoDisplay(iso) { const d=new Date(iso+'T00:00:00'); return (d.getMonth()+1)+'/'+d.getDate(); }
function fmt(n)          { return '$'+n.toFixed(2); }

function getWeekEntries(offset) {
  const { monday, sunday } = getWeekDates(offset);
  return entries.filter(e => { const d=new Date(e.date+'T00:00:00'); return d>=monday && d<=sunday; });
}
function getFoodSpent(offset) { return getWeekEntries(offset).filter(e=>e.cat==='food').reduce((s,e)=>s+e.amt,0); }
function getTotalSpent(offset) { return getWeekEntries(offset).reduce((s,e)=>s+e.amt,0); }

function saveSettings() {
  // Read income fields
  const s = parseFloat(document.getElementById('inc-salary').value) || 0;
  const sub = parseFloat(document.getElementById('inc-subsidy').value) || 0;
  const fb = parseFloat(document.getElementById('food-budget-inp').value) || 0;
  settings.salary = s;
  settings.subsidy = sub;
  settings.foodBudget = fb;
  localStorage.setItem('budget_settings', JSON.stringify(settings));
}

function saveEntries() { localStorage.setItem('budget_entries', JSON.stringify(entries)); }

// ═══════════════════════════════════════
//  RENDER — WEEK
// ═══════════════════════════════════════
function renderWeekLabel() {
  const { monday, sunday } = getWeekDates(currentWeekOffset);
  const label = currentWeekOffset === 0
    ? `本週 ${fmtDate(monday)} – ${fmtDate(sunday)}`
    : currentWeekOffset < 0
      ? `前 ${Math.abs(currentWeekOffset)} 週 ${fmtDate(monday)}–${fmtDate(sunday)}`
      : `後 ${currentWeekOffset} 週 ${fmtDate(monday)}–${fmtDate(sunday)}`;
  document.getElementById('week-label').textContent = label;
}

function renderSummary() {
  const food   = getFoodSpent(currentWeekOffset);
  const budget = weeklyFoodBudget();
  const remain = budget - food;
  const over   = food > budget;
  const pct    = Math.min((food / budget) * 100, 100);

  document.getElementById('sum-budget').textContent  = fmt(budget);
  document.getElementById('sum-spent').textContent   = fmt(food);
  document.getElementById('sum-spent').className     = 's-value ' + (over ? 'c-red' : 'c-yellow');
  document.getElementById('sum-remain').textContent  = fmt(Math.abs(remain));
  document.getElementById('sum-remain').className    = 's-value ' + (over ? 'c-red' : 'c-green');
  document.getElementById('sum-remain-sub').textContent = over ? '⚠️ 已超支' : '還可以花';

  document.getElementById('bar-pct').textContent = Math.round(pct) + '%';
  const fill = document.getElementById('bar-fill');
  fill.style.width = pct + '%';
  fill.className = 'bar-fill' + (over ? ' over' : '');
  document.getElementById('alert-bar').className = 'alert-bar' + (over ? ' show' : '');
}

function renderEntries() {
  const list = document.getElementById('entry-list');
  const we   = getWeekEntries(currentWeekOffset);
  if (!we.length) { list.innerHTML='<div class="empty-state">本週還沒有記帳記錄 🌟</div>'; return; }
  const sorted = [...we].sort((a,b)=>b.date.localeCompare(a.date));
  list.innerHTML = sorted.map(e => `
    <div class="entry-item">
      <span class="e-date">${isoDisplay(e.date)}</span>
      <span class="e-cat-dot" style="background:${CAT_COLORS[e.cat]||'#7b82a8'}"></span>
      <span class="e-desc">${e.desc||'（無說明）'}</span>
      <span class="e-cat-badge">${CAT_NAMES[e.cat]||e.cat}</span>
      <span class="e-amt">-${fmt(e.amt)}</span>
      <button class="e-del" onclick="deleteEntry('${e.id}')">✕</button>
    </div>`).join('');
}

// ═══════════════════════════════════════
//  RENDER — MONTH
// ═══════════════════════════════════════
function renderMonth() {
  const list = document.getElementById('month-list');
  const budget = weeklyFoodBudget();
  let html = '';
  for (let i=0; i>=-4; i--) {
    const {monday,sunday} = getWeekDates(i);
    const food  = getFoodSpent(i);
    const total = getTotalSpent(i);
    const over  = food > budget;
    const label = i===0 ? '本週' : `${Math.abs(i)} 週前`;
    html += `
      <div class="month-week">
        <div class="mw-header">
          <span>${label}（${fmtDate(monday)} – ${fmtDate(sunday)}）</span>
          <span style="color:${over?'var(--red)':'var(--green)'}">伙食 ${fmt(food)}</span>
        </div>
        <div class="mw-sub">
          全部支出：${fmt(total)} ｜ 伙食預算：${over
            ? `<span style="color:var(--red)">超支 ${fmt(food-budget)}</span>`
            : `剩 <span style="color:var(--green)">${fmt(budget-food)}</span>`}
        </div>
      </div>`;
  }
  list.innerHTML = html || '<div class="empty-state">暫無資料</div>';
}

// ═══════════════════════════════════════
//  RENDER — BILLS TAB
// ═══════════════════════════════════════
function renderBillsTab() {
  // Income fields
  document.getElementById('inc-salary').value   = settings.salary;
  document.getElementById('inc-subsidy').value  = settings.subsidy;
  document.getElementById('food-budget-inp').value = settings.foodBudget;

  const income  = weeklyIncome();
  const fixed   = weeklyBills();
  const disp    = income - fixed;
  const savings = disp - settings.foodBudget;

  document.getElementById('total-income-display').textContent = fmt(income);
  document.getElementById('bd-income').textContent    = fmt(income);
  document.getElementById('bd-fixed').textContent     = '-' + fmt(fixed);
  document.getElementById('bd-disposable').textContent= fmt(disp);
  document.getElementById('bd-savings').textContent   = savings >= 0 ? fmt(savings) : '-'+fmt(-savings);
  document.getElementById('bd-savings').className     = savings >= 0 ? 'c-green' : 'c-red';
  document.getElementById('bd-monthly-savings').textContent = '≈ ' + fmt(Math.max(0,savings)*4.33).replace('.00','');

  // Bills list
  const billsList = document.getElementById('bills-list');
  billsList.innerHTML = settings.bills.map((b,i) => {
    const freq = FREQ_OPTIONS.find(o=>o.value===b.freq) || FREQ_OPTIONS[2];
    const weekly = b.amt / freq.divisor;
    const freqOptions = FREQ_OPTIONS.map(o=>
      `<option value="${o.value}" ${o.value===b.freq?'selected':''}>${o.label}</option>`
    ).join('');
    return `
      <div class="bill-edit-row" id="bill-row-${b.id}">
        <span class="emoji-cell" title="點擊換圖示" onclick="pickEmoji('${b.id}',this)">${b.emoji}</span>
        <input type="text" value="${b.name}" placeholder="說明"
               oninput="updateBill('${b.id}','name',this.value)" />
        <input type="number" step="0.01" value="${b.amt}" placeholder="金額"
               oninput="updateBill('${b.id}','amt',parseFloat(this.value)||0)" />
        <select onchange="updateBill('${b.id}','freq',this.value)">${freqOptions}</select>
        <span class="weekly-cell">${fmt(weekly)}/週</span>
        <button class="bill-del-btn" onclick="deleteBill('${b.id}')" title="刪除">🗑</button>
      </div>`;
  }).join('');
}

// ═══════════════════════════════════════
//  BILL ACTIONS
// ═══════════════════════════════════════
function updateBill(id, field, value) {
  const b = settings.bills.find(x=>x.id===id);
  if (!b) return;
  b[field] = value;
  // Recalculate weekly display in that row
  const freq = FREQ_OPTIONS.find(o=>o.value===b.freq) || FREQ_OPTIONS[2];
  const row  = document.getElementById('bill-row-'+id);
  if (row) row.querySelector('.weekly-cell').textContent = fmt(b.amt/freq.divisor)+'/週';
  // Recalc totals
  const income  = weeklyIncome();
  const fixed   = weeklyBills();
  const disp    = income - fixed;
  const savings = disp - settings.foodBudget;
  document.getElementById('bd-fixed').textContent      = '-'+fmt(fixed);
  document.getElementById('bd-disposable').textContent = fmt(disp);
  document.getElementById('bd-savings').textContent    = savings >= 0 ? fmt(savings) : '-'+fmt(-savings);
  document.getElementById('bd-savings').className      = savings >= 0 ? 'c-green' : 'c-red';
  document.getElementById('bd-monthly-savings').textContent = '≈ '+fmt(Math.max(0,savings)*4.33).replace('.00','');
  localStorage.setItem('budget_settings', JSON.stringify(settings));
}

function addBill() {
  settings.bills.push({
    id: 'b_'+Date.now(),
    emoji: '📦',
    name: '',
    amt: 0,
    freq: 'monthly'
  });
  localStorage.setItem('budget_settings', JSON.stringify(settings));
  renderBillsTab();
  // Focus the new name input
  const rows = document.querySelectorAll('.bill-edit-row');
  const last = rows[rows.length-1];
  if (last) last.querySelector('input[type=text]').focus();
}

function deleteBill(id) {
  if (!confirm('確認刪除此固定支出項目？')) return;
  settings.bills = settings.bills.filter(b=>b.id!==id);
  localStorage.setItem('budget_settings', JSON.stringify(settings));
  renderBillsTab();
}

// ── Emoji picker ──
let emojiPickerTarget = null;
function pickEmoji(billId, spanEl) {
  // Remove any existing picker
  document.querySelectorAll('.emoji-options').forEach(el=>el.remove());
  emojiPickerTarget = billId;
  const picker = document.createElement('div');
  picker.className = 'emoji-options';
  picker.style.top  = (spanEl.getBoundingClientRect().bottom + window.scrollY + 4) + 'px';
  picker.style.left = (spanEl.getBoundingClientRect().left)  + 'px';
  EMOJI_LIST.forEach(em => {
    const s = document.createElement('span');
    s.textContent = em;
    s.onclick = (e) => {
      e.stopPropagation();
      const b = settings.bills.find(x=>x.id===billId);
      if (b) { b.emoji = em; localStorage.setItem('budget_settings',JSON.stringify(settings)); renderBillsTab(); }
      picker.remove();
    };
    picker.appendChild(s);
  });
  document.body.appendChild(picker);
  setTimeout(() => document.addEventListener('click', ()=>picker.remove(), {once:true}), 10);
}

// ═══════════════════════════════════════
//  ENTRY ACTIONS
// ═══════════════════════════════════════
function addEntry() {
  const desc = document.getElementById('inp-desc').value.trim();
  const amt  = parseFloat(document.getElementById('inp-amt').value);
  const date = document.getElementById('inp-date').value;
  const cat  = document.getElementById('inp-cat').value;
  if (!amt || amt<=0 || !date) { alert('請填寫金額與日期'); return; }
  entries.push({ id: Date.now().toString(36), desc, amt, date, cat });
  saveEntries();
  document.getElementById('inp-desc').value = '';
  document.getElementById('inp-amt').value  = '';
  renderAll();
}

function deleteEntry(id) {
  if (!confirm('確認刪除此筆記錄？')) return;
  entries = entries.filter(e=>e.id!==id);
  saveEntries();
  renderAll();
}

// ═══════════════════════════════════════
//  TAB SWITCH
// ═══════════════════════════════════════
const TAB_IDS = ['week','month','bills'];
function switchTab(tab) {
  TAB_IDS.forEach(t => {
    document.getElementById('tab-'+t).style.display = t===tab ? '' : 'none';
  });
  document.querySelectorAll('.tab').forEach((el,i) => {
    el.className = 'tab' + (TAB_IDS[i]===tab ? ' active' : '');
  });
  if (tab==='month') renderMonth();
  if (tab==='bills') renderBillsTab();
}

function changeWeek(delta) { currentWeekOffset += delta; renderAll(); }

function renderAll() {
  renderWeekLabel();
  renderSummary();
  renderEntries();
  renderMonth();
}

// ═══════════════════════════════════════
//  INIT
// ═══════════════════════════════════════
window.onload = () => {
  document.getElementById('inp-date').value = fmtDateInp(new Date());
  document.getElementById('inc-salary').value      = settings.salary;
  document.getElementById('inc-subsidy').value     = settings.subsidy;
  document.getElementById('food-budget-inp').value = settings.foodBudget;
  renderBillsTab();
  renderAll();
};
</script>
